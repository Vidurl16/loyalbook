<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect 10 — Loyalty Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
body {
  background: #0e0c0a;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  -webkit-font-smoothing: antialiased;
}
div::-webkit-scrollbar { display: none; }

@keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
@keyframes fadeUp  { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
@keyframes scaleIn { from { opacity:0; transform:scale(0.88) } to { opacity:1; transform:scale(1) } }

@keyframes shimmerTravel {
  from { stroke-dashoffset: 0; }
  to   { stroke-dashoffset: -553; }
}
@keyframes tierGlow {
  0%,100% { filter: drop-shadow(0 0 4px var(--tier-col)); }
  50%      { filter: drop-shadow(0 0 16px var(--tier-col)); }
}
@keyframes celebrate {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.18); }
  60%  { transform: scale(0.96); }
  100% { transform: scale(1); }
}
@keyframes particles {
  0%   { opacity:1; transform: translate(0,0) scale(1); }
  100% { opacity:0; transform: translate(var(--px),var(--py)) scale(0); }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const T = {
  onyx950:'#0e0c0a', onyx900:'#1a1612', onyx800:'#242018',
  onyx700:'#302b22', onyx600:'#3e3830', onyx500:'#554f46',
  gold400:'#c9a85c', gold300:'#dfc07a', gold200:'#f0e0b8', gold500:'#b8922e',
  cream50:'#fdf9f4', cream100:'#f7eedf', cream200:'#ede0cc',
  cream300:'#ddd0bc', cream400:'#c9b99e',
};

const TIERS = [
  { id:'bronze',  label:'Bronze',    min:0,     max:2499,  col:'oklch(62% 0.10 55)',  colHex:'#c8864a', glyph:'B', tagline:'Welcome, darling.' },
  { id:'silver',  label:'Silver',    min:2500,  max:4999,  col:'oklch(78% 0.03 80)',  colHex:'#cbc4b8', glyph:'S', tagline:'Your beauty, elevated.' },
  { id:'gold',    label:'Gold',      min:5000,  max:9999,  col:'#c9a85c',             colHex:'#c9a85c', glyph:'G', tagline:'The inner circle.' },
  { id:'perfect', label:'Perfect 10',min:10000, max:Infinity, col:'oklch(96% 0.04 95)', colHex:'#f5f0e4', glyph:'✦', tagline:'You have arrived.' },
];

function getTier(pts) {
  return TIERS.find(t => pts >= t.min && pts <= t.max) || TIERS[3];
}

/* ── PARTICLE BURST ──────────────────────────────────────── */
function ParticleBurst({ active, cx, cy }) {
  if (!active) return null;
  const count = 24;
  const colors = [T.gold400, T.gold300, T.cream200, T.gold200, '#fff8e7'];
  const items = Array.from({ length: count }, (_, i) => {
    const angle = (i / count) * Math.PI * 2;
    const dist = 28 + Math.random() * 36;
    return {
      px: Math.cos(angle) * dist + 'px',
      py: Math.sin(angle) * dist + 'px',
      color: colors[i % colors.length],
      size: 2 + Math.random() * 3,
      delay: Math.random() * 0.12,
    };
  });
  return (
    <div style={{ position:'absolute', top:cy, left:cx, pointerEvents:'none', zIndex:80 }}>
      {items.map((p,i) => (
        <div key={i} style={{
          position:'absolute',
          width: p.size, height: p.size,
          borderRadius: Math.random()>0.5 ? '50%' : '1px',
          background: p.color,
          top: -p.size/2, left: -p.size/2,
          '--px': p.px, '--py': p.py,
          animation: `particles 0.65s ${p.delay}s cubic-bezier(0.16,1,0.3,1) both`,
        }} />
      ))}
    </div>
  );
}

/* ── PERFECT 10 METER ────────────────────────────────────── */
function PerfectTenMeter({ points, maxPoints, tier, onUpgrade }) {
  const [progress, setProgress] = useState(0);
  const [shimmerOn, setShimmerOn] = useState(false);
  const [burst, setBurst] = useState(false);

  const R = 90;
  const CIRC = 2 * Math.PI * R; // 565.5
  const pct = Math.min(points / maxPoints, 1);
  const filled = CIRC * pct;
  const SIZE = 220;
  const CX = SIZE / 2;

  // Animate fill on mount
  useEffect(() => {
    let raf, start = null;
    const duration = 1400;
    const ease = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    const tick = (ts) => {
      if (!start) start = ts;
      const elapsed = ts - start;
      const t = Math.min(elapsed / duration, 1);
      setProgress(ease(t) * pct);
      if (t < 1) raf = requestAnimationFrame(tick);
      else { setProgress(pct); setShimmerOn(true); }
    };
    const delay = setTimeout(() => { raf = requestAnimationFrame(tick); }, 600);
    return () => { clearTimeout(delay); cancelAnimationFrame(raf); };
  }, [pct]);

  const currentFilled = CIRC * progress;
  const tierBorderColor = tier.col;

  // Tick positions at tier thresholds
  const ticks = TIERS.map(t => {
    const p = t.min / maxPoints;
    const angle = -Math.PI/2 + p * Math.PI * 2;
    const inner = R - 10, outer = R + 8;
    return {
      x1: CX + inner * Math.cos(angle),
      y1: CX + inner * Math.sin(angle),
      x2: CX + outer * Math.cos(angle),
      y2: CX + outer * Math.sin(angle),
      active: points >= t.min,
      col: t.col,
      colHex: t.colHex,
    };
  });

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', position:'relative' }}>
      {/* SVG dial */}
      <div style={{ position:'relative', width:SIZE, height:SIZE }}>
        <svg width={SIZE} height={SIZE} viewBox={`0 0 ${SIZE} ${SIZE}`} style={{ transform:'rotate(-90deg)', display:'block' }}>
          <defs>
            <linearGradient id="goldArc" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stopColor={T.gold500} />
              <stop offset="40%"  stopColor={T.gold400} />
              <stop offset="70%"  stopColor={T.gold300} />
              <stop offset="100%" stopColor={T.gold200} />
            </linearGradient>
            <linearGradient id="shimmerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stopColor="rgba(255,248,220,0)" />
              <stop offset="50%"  stopColor="rgba(255,248,220,0.7)" />
              <stop offset="100%" stopColor="rgba(255,248,220,0)" />
            </linearGradient>
            <filter id="goldGlow">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          {/* Track ring */}
          <circle cx={CX} cy={CX} r={R}
            fill="none" stroke={T.onyx700} strokeWidth="10"

          <circle cx={CX} cy={CX} r={R}

          {/* Gold fill arc */}
          <circle cx={CX} cy={CX} r={R}
            fill="none"
            stroke="url(#goldArc)"
            strokeWidth="10"
            strokeLinecap="round"
            strokeDasharray={`${currentFilled} ${CIRC}`}
            strokeDashoffset="0"
            filter="url(#goldGlow)"
          />

          {/* Shimmer traveling segment */}
          {shimmerOn && progress > 0.04 && (
            <circle cx={CX} cy={CX} r={R}

              stroke="url(#shimmerGrad)"

              strokeLinecap="round"
              opacity={tk.active ? 1 : 0.5}
            />
          ))}

          {/* Inner subtle ring */}
          <circle cx={CX} cy={CX} r={R - 18}
            fill="none" stroke={T.onyx800} strokeWidth="1" opacity="0.6"
          />
        </svg>

        {/* Center content */}
        <div style={{
          position:'absolute', inset:0,
          display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
          gap:2,
        }}>
          {/* Ambient inner glow */}
          <div style={{
            position:'absolute',
            width:120, height:120, borderRadius:'50%',
            background:`radial-gradient(circle, rgba(201,168,92,0.10) 0%, transparent 70%)`,
            pointerEvents:'none',

          <div style={{
            fontFamily:"'Cormorant Garamond',serif",
            fontSize:38, fontWeight:300, lineHeight:1, letterSpacing:'-0.02em',

            fontFamily:"'DM Sans',sans-serif",

        {/* Particles on upgrade */}
        <ParticleBurst active={burst} cx={SIZE/2} cy={SIZE/2} />

      <div style={{ marginTop:6, textAlign:'center' }}>

/* ── MILESTONE MARKERS ───────────────────────────────────── */
function MilestoneMarkers({ points }) {
  return (
    <div style={{ padding:'0 22px', marginTop:2 }}>
      {/* Horizontal spine line */}
      <div style={{ position:'relative', height:40 }}>
        <div style={{ position:'absolute', top:'50%', left:0, right:0, height:1, background:`linear-gradient(90deg,transparent,${T.onyx600} 8%,${T.onyx600} 92%,transparent)`, transform:'translateY(-50%)' }} />

        {/* Gold fill up to current */}
        <div style={{
          position:'absolute', top:'50%', left:0,
          height:1, background:T.gold400, opacity:0.5,
          transform:'translateY(-50%)',
          width:`${Math.min(points/10000*100,100)}%`,
          transition:'width 1.4s cubic-bezier(0.16,1,0.3,1)',
        }} />

        {/* Four markers */}
        {TIERS.map((t, i) => {
          const pct = i === 0 ? 0 : t.min / 10000;
          const achieved = points >= t.min;
          return (
            <div key={t.id} style={{
              position:'absolute', top:'50%', left:`${pct * 100}%`,
              transform:'translate(-50%,-50%)',
              display:'flex', flexDirection:'column', alignItems:'center',
              gap:4,
            }}>
              {/* Dot */}
              <div style={{
                width: achieved ? 8 : 5,
                height: achieved ? 8 : 5,
                borderRadius:'50%',
                background: achieved ? t.colHex : T.onyx600,
                boxShadow: achieved ? `0 0 8px ${t.colHex}88` : 'none',
                transition:'all 0.3s ease',
                flexShrink:0,
              }} />
            </div>
          );
        })}
      </div>

      {/* Labels below */}
      <div style={{ display:'flex', justifyContent:'space-between', marginTop:4 }}>
        {TIERS.map((t, i) => {
          const achieved = points >= t.min;
          const isCurrent = getTier(points).id === t.id;
          return (
            <div key={t.id} style={{ display:'flex', flexDirection:'column', alignItems: i===0 ? 'flex-start' : i===3 ? 'flex-end' : 'center', maxWidth:60 }}>
              <span style={{
                fontFamily:"'DM Sans',sans-serif",

                letterSpacing:'0.18em', textTransform:'uppercase',
                color: isCurrent ? t.colHex : achieved ? T.cream400 : T.onyx500,
                fontWeight: isCurrent ? 500 : 300,

                <span style={{

      </div>
    </div>
  );

/* ── TWEAKS ─────────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "startingPoints": 6800,
  "showShimmer": true
}/*EDITMODE-END*/;

  const [tweaksOpen, setTweaksOpen]   = useState(false);

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode')  setTweaksOpen(false);
    });
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
  }, []);

  const set = (k, v) => {
    setTweaks(t => { const n={...t,[k]:v}; window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*'); return n; });
  };

  return (
    <>
      <LoyaltyHub points={tweaks.startingPoints} />
      {tweaksOpen && (
        <div style={{ position:'fixed', bottom:22, right:22, background:T.onyx800, border:`1px solid ${T.onyx600}`, borderRadius:2, padding:'16px 18px', width:220, zIndex:9999, boxShadow:'6px 10px 0 rgba(0,0,0,0.7)', fontFamily:"'DM Sans',sans-serif" }}>
          <div style={{ fontSize:8, letterSpacing:'0.3em', textTransform:'uppercase', color:T.gold400, marginBottom:12, fontWeight:500 }}>Tweaks</div>
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:9, letterSpacing:'0.14em', textTransform:'uppercase', color:T.cream400, marginBottom:6 }}>Starting Points</div>
            <input type="range" min={0} max={10000} step={100} value={tweaks.startingPoints}
              onChange={e => set('startingPoints', +e.target.value)}
              style={{ width:'100%', accentColor:T.gold400 }} />
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:16, color:T.gold400, marginTop:4, fontStyle:'italic' }}>{tweaks.startingPoints.toLocaleString()} pts</div>
          </div>
          <label style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <span style={{ fontSize:11, color:T.cream300 }}>Arc Shimmer</span>
            <div onClick={() => set('showShimmer', !tweaks.showShimmer)} style={{ width:30, height:17, borderRadius:100, background: tweaks.showShimmer ? T.gold400 : T.onyx600, position:'relative', transition:'background 0.18s', cursor:'pointer', flexShrink:0 }}>
              <div style={{ position:'absolute', top:2, left: tweaks.showShimmer ? 15 : 2, width:13, height:13, borderRadius:'50%', background: tweaks.showShimmer ? T.onyx950 : T.onyx500, transition:'left 0.18s ease' }} />
            </div>
          </label>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
